AWSTemplateFormatVersion: '2010-09-09'
Description: ec2 create

Resources:
  # 1. Define the Security Group
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 # For better security, restrict this to your IP
       
  # 2. Define the EC2 Instance
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro 
      ImageId: ami-0741dc526e1106ae5 # Replace with a valid AMI ID for your region
      KeyName: man
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      Tags:
        - Key: Name
          Value: system-creation-ec23
  