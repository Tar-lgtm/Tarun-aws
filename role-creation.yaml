AWSTemplateFormatVersion: '2010-09-09'
Description: iam-role

Resources:
  MyS3ReadRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'auto68-role'
      Description: 'create cicd-role'
      
      # 1. Trust Policy: Defines who can assume this role (EC2 Service)
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service:
                - 'ec2.amazonaws.com'
            Action:
              - 'sts:AssumeRole'
      
      # 2. Managed Policies: Attaches existing AWS managed policies
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess'
        
       
      # 3. Inline Policies: Creates custom permissions unique to this role
      Policies:
        - PolicyName: 'ec2-s3-inline-policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 's3:putObject'
                  
                Resource: '*'
                
  

